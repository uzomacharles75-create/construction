name: Deploy Construction Backend

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd apps/api && yarn install --ignore-engines
      - name: Build TypeScript
        run: cd apps/api && yarn build
      - name: Zip code
        run: cd apps/api && zip -r deploy.zip . -x "node_modules/*"
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: construction
          environment_name: Construction-prod-env
          region: eu-north-1
          version_label: deploy-${{ github.run_number }}-${{ github.sha }}
          deployment_package: apps/api/deploy.zip