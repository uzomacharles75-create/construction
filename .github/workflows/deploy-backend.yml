name: Deploy Backend to AWS

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          cd apps/api
          npm install --legacy-peer-deps
      
      - name: Zip code
        run: |
          cd apps/api
          zip -r deploy.zip . -x "node_modules/*"
      
      - name: Deploy to Elastic Beanstalk
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-north-1
        run: |
          VERSION="v${{ github.run_number }}-${{ github.sha }}"
          echo "Deploying version: $VERSION"
          
          # Upload to S3
          aws s3 cp apps/api/deploy.zip s3://elasticbeanstalk-eu-north-1-990521646564/$VERSION.zip
          
          # Create application version
          aws elasticbeanstalk create-application-version \
            --application-name api \
            --version-label $VERSION \
            --source-bundle S3Bucket="elasticbeanstalk-eu-north-1-990521646564",S3Key="$VERSION.zip"
          
          # Wait 10 seconds for version to be ready
          sleep 10
          
          # Deploy
          aws elasticbeanstalk update-environment \
            --environment-name Construction-prod-env \
            --version-label $VERSION
          
          echo "Deployment initiated successfully!"