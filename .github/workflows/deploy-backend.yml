name: Deploy Backend to AWS

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          check-latest: true
      
      - name: Install dependencies
        run: |
          cd apps/api
          yarn install --ignore-engines
      
      - name: Create deployment package
        run: |
          cd apps/api
          zip -r deploy.zip . -x "*.git*"
      
      - name: Deploy to Elastic Beanstalk
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-north-1
        run: |
          VERSION="deploy-$(date +'%Y%m%d-%H%M%S')"
          echo "Version label: $VERSION"
          
          # Upload to S3
          aws s3 cp apps/api/deploy.zip s3://elasticbeanstalk-eu-north-1-990521646564/api/$VERSION.zip
          
          # Create application version
          aws elasticbeanstalk create-application-version \
            --application-name api \
            --version-label $VERSION \
            --source-bundle S3Bucket="elasticbeanstalk-eu-north-1-990521646564",S3Key="api/$VERSION.zip"
          
          # Wait for version to be ready (check every 10 seconds)
          echo "Waiting for version to be processed..."
          while true; do
            STATUS=$(aws elasticbeanstalk describe-application-versions \
              --application-name api \
              --version-label $VERSION \
              --query "ApplicationVersions[0].Status" \
              --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "PROCESSED" ]; then
              break
            fi
            sleep 10
          done
          
          # Deploy to environment
          aws elasticbeanstalk update-environment \
            --environment-name Construction-prod-env \
            --version-label $VERSION
          
          echo "Deployment initiated! Check AWS Console for status."