name: Deploy Construction Backend

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd apps/api && yarn install --ignore-engines
      - name: Build TypeScript
        run: cd apps/api && yarn build
      - name: Zip code
        run: cd apps/api && zip -r deploy.zip . -x "node_modules/*"
      - name: Deploy to Elastic Beanstalk
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-north-1
        run: |
          VERSION="deploy-$(date +'%Y%m%d-%H%M%S')"
          echo "Deploying version: $VERSION"
          
          aws s3 cp apps/api/deploy.zip s3://elasticbeanstalk-eu-north-1-990521646564/$VERSION.zip
          
          aws elasticbeanstalk create-application-version \
            --application-name construction-prod \
            --version-label $VERSION \
            --source-bundle S3Bucket="elasticbeanstalk-eu-north-1-990521646564",S3Key="$VERSION.zip"
          
          aws elasticbeanstalk update-environment \
            --environment-name Construction-node-env-env \
            --version-label $VERSION
          
          echo "Deployment initiated!"