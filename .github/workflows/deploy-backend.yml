name: Deploy Backend to AWS

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          check-latest: true
      
      - name: Install dependencies
        run: |
          cd apps/api
          yarn install --ignore-engines
      
      - name: Create deployment package
        run: |
          cd apps/api
          zip -r deploy.zip . -x "*.git*"
      
      - name: Deploy to Elastic Beanstalk
        uses: highcanfly/elastic-beanstalk-deploy@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: eu-north-1
          application-name: api
          environment-name: Construction-prod-env
          version-label: deploy-${{ github.run_number }}-${{ github.run_id }}
          bucket-name: elasticbeanstalk-eu-north-1-990521646564
          bucket-path: api
          deployment-file: apps/api/deploy.zip